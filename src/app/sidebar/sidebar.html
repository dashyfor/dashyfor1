<body
  class="hold-transition dark-mode sidebar-mini layout-fixed layout-navbar-fixed layout-footer-fixed"
>
  <!-- Main Sidebar Container -->
  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <!-- Brand Logo -->
    <a href="index3.html" class="brand-link">
      <img
        src="dist/img/Shark.jpg"
        alt="AdminLTE Logo"
        class="brand-image img-circle elevation-3"
        style="opacity: 0.8"
      />
      <span class="brand-text font-weight-light">AdminLTE 3</span>
    </a>

    <!-- Sidebar -->
    <div class="sidebar">
      <!-- Sidebar user panel (optional) -->
      <div class="user-panel mt-3 pb-3 mb-3 d-flex">
        <div class="image">
          <img src="/video/dendy.jpg" class="img-circle elevation-2" alt="User Image" />
        </div>
        <div class="info">
          <a href="#" class="d-block">dendy kiyanu</a>
          <a href="#" class="d-block">231103886</a>
        </div>
      </div>

      <!-- SidebarSearch Form -->
      <div class="form-inline">
        <div class="input-group" data-widget="sidebar-search">
          <input
            class="form-control form-control-sidebar"
            type="search"
            placeholder="Search"
            aria-label="Search"
          />
          <div class="input-group-append">
            <button class="btn btn-sidebar">
              <i class="fas fa-search fa-fw"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- Sidebar Menu -->
      <nav class="mt-2">
        <ul
          class="nav nav-pills nav-sidebar flex-column"
          data-widget="treeview"
          role="menu"
          data-accordion="false"
        >
          <!-- Add icons to the links using the .nav-icon class
               with font-awesome or any other icon font library -->
          <li
            class="nav-item has-treeview {{
              (moduleName == 'dashboard' ||
                moduleName == 'dashboard2' ||
                moduleName == 'dashboard3') &&
                'menu-open'
            }}"
          >
            <a
              href="#"
              class="nav-link {{
                (moduleName == 'dashboard' ||
                  moduleName == 'dashboard2' ||
                  moduleName == 'dashboard3') &&
                  'active'
              }}"
            >
              <i class="nav-icon fas fa-tachometer-alt"></i>

              <p>
                Dashboard
                <i class="right fas fa-angle-left"></i>
              </p>
            </a>

            <ul class="nav nav-treeview">
              <li class="nav-item">
                <a
                  [routerLink]="['/dashboard']"
                  routerLinkActive="router-link-active"
                  class="nav-link {{ moduleName == 'dashboard' ? 'active' : '' }}"
                >
                  <i class="far fa-circle nav-icon"></i>
                  <p>Dashboard v1</p>
                </a>
              </li>

              <li class="nav-item">
                <a
                  [routerLink]="['/dashboard2']"
                  routerLinkActive="router-link-active"
                  class="nav-link {{ moduleName === 'Dashboard2' ? 'active' : '' }}"
                >
                  <i class="far fa-circle nav-icon"></i>
                  <p>Dashboard v2</p>
                </a>
              </li>
              <li class="nav-item">
                <a
                  [routerLink]="['/dashboard3']"
                  routerLinkActive="router-link-active"
                  class="nav-link {{ moduleName === 'Dashboard3' ? 'active' : '' }}"
                >
                  <i class="far fa-circle nav-icon"></i>
                  <p>Dashboard v3</p>
                </a>
              </li>
            </ul>
          </li>
          <li class="nav-item">
            <a
              [routerLink]="['/mahasiswa']"
              routerLinkActive="router-link-active"
              class="nav-link {{ moduleName == 'mahasiswa' ? 'active' : '' }}"
            >
              <i class="nav-icon fas fa-graduation-cap"></i>
              <p>Mahasiswa</p>
            </a>
          </li>

          <li class="nav-item">
            <a
              [routerLink]="['/forex']"
              routerLinkActive="router-link-active"
              class="nav-link {{ moduleName == 'forex' ? 'active' : '' }}"
            >
              <i class="nav-icon fas fa-money-bill-alt"></i>
              <p>forex</p>
            </a>
          </li>

          <li class="nav-item">
            <a
              [routerLink]="['/cuaca']"
              routerLinkActive="router-link-active"
              class="nav-link {{ moduleName == 'cuaca' ? 'active' : '' }}"
            >
              <i class="nav-icon fas fa-cloud-rain"></i>
              <p>cuaca</p>
            </a>
          </li>

          <li class="nav-item">
            <a
              [routerLink]="['/sudoku']"
              routerLinkActive="router-link-active"
              class="nav-link {{ moduleName == 'sudoku' ? 'active' : '' }}"
            >
              <i class="nav-icon fas fa-hashtag"></i>
              <p>sudoku</p>
            </a>
          </li>

          <li class="nav-item">
            <a href="javascript:void(0)" class="nav-link" (click)="toggleTheme()">
              <i
                class="nav-icon fas fa-sun"
                [class.fa-moon]="!isDarkMode"
                [class.fa-sun]="isDarkMode"
              ></i>
              <p>{{ isDarkMode ? 'Light Mode' : 'Dark Mode' }}</p>
            </a>
          </li>

          <li class="nav-item">
            <a
              [routerLink]="['/logout']"
              routerLinkActive="router-link-active"
              class="nav-link {{ moduleName == 'logout' ? 'active' : '' }}"
            >
              <i class="nav-icon fas fa-circle"></i>
              <p>logout</p>
            </a>
          </li>

        </ul>
      </nav>
      <!-- /.sidebar-menu -->
    </div>
    <!-- /.sidebar -->

    <!-- Control Sidebar -->
    <aside class="control-sidebar control-sidebar-dark">
      <!-- Control sidebar content goes here -->
    </aside>
    <!-- /.control-sidebar -->
  </aside>
</body>
