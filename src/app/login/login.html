<div class="login-bg">

    <img
      src="video/helm.jpg"
      class="hero__image hero__image--face">

    <img
      src="video/nohelm.jpg"
      class="hero__image hero__image--helmet">

</div>


<!-- Container form login (tetap sama seperti yang Anda punya) -->
<div class="login-wrapper">
  <div class="login-box">
    <div class="card card-outline card-primary">
      <div class="glass-card">
        <div class="text-header">
          <h1><b>Dendy</b> Kiyanu</h1>
        </div>
        <div class="card-body">
          <p class="login-box-msg">Sign in to start your session</p>

          <div class="input-group mb-3">
            <input type="text" class="form-control" placeholder="User Id" id="idText">
            <div class="input-group-append">
              <div class="input-group-text">
                <span class="fas fa-envelope"></span>
              </div>
            </div>
          </div>

          <div class="input-group mb-3">
            <input type="password" class="form-control" placeholder="Password" id="passwordText">
            <div class="input-group-append">
              <div class="input-group-text">
                <span class="fas fa-lock"></span>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-8">
              <div class="icheck-primary">
                <input type="checkbox" id="remember">
                <label for="remember">Remember Me</label>
              </div>
            </div>
            <div class="col-4">
              <button class="btn btn-glass" (click)="signIn()">Sign In</button>
            </div>
          </div>

          <div class="social-auth-links text-center mt-4 mb-3">
            <a href="#" class="btn btn-block btn-primary">
              <i class="fab fa-facebook mr-2"></i> Sign in using Facebook
            </a>
            <a href="#" class="btn btn-block btn-danger mt-2">
              <i class="fab fa-google-plus mr-2"></i> Sign in using Google+
            </a>
          </div>

          <p class="mb-1">
            <a href="forgot-password.html">I forgot my password</a>
          </p>
          <p class="mb-0">
            <a href="register.html" class="text-center" [routerLink]="['/register']">Register a new membership</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Peringatan (tidak diubah) -->
<div class="modal" id="peringatanModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-warning">
        <h5 class="modal-title">
          <i class="fa fa-exclamation-circle"></i>
          Peringatan
        </h5>
        <button class="close" data-dismiss="modal">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <div class="row">
          <div class="col-md-12 col-lg-12 col-xs-12">
            <span id="pm_message"></span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-warning" data-dismiss="modal">
          <i class="fa fa-check"></i>
          Ok
        </button>
      </div>
    </div>
  </div>
</div>
