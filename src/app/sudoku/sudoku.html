<body class="hold-transition sidebar-mini layout-fixed layout-navbar-fixed layout-footer-fixed pace-primary">
<div class="sudoku-wrapper">
  <app-header></app-header>
  <app-sidebar moduleName="sudoku"></app-sidebar>
  <div class="sudoku-main">
    <div class="sudoku-container glass">
      <h1>🧩 Sudoku</h1>
      
      <!-- Pesan error -->
      <div *ngIf="errorMessage" class="error-toast glass-error">
        {{ errorMessage }}
      </div>

      <!-- Tombol angka 1-9 dengan sisa count -->
      <div class="number-panel">
        <button *ngFor="let num of [1,2,3,4,5,6,7,8,9]"
                class="num-btn glass-btn"
                [class.selected]="selectedNumber === num"
                [class.disabled]="isNumberDisabled(num)"
                (click)="selectNumber(num)"
                [disabled]="isNumberDisabled(num)">
          {{ num }}
          <span class="badge">{{ getRemainingCount(num) }}</span>
        </button>
      </div>

      <!-- Grid Sudoku -->
      <div class="grid-wrapper">
        <table class="sudoku-grid">
          <tbody>
            <tr *ngFor="let row of grid; let r = index">
              <td *ngFor="let cell of row; let c = index"
                  (click)="onCellClick(r, c)"
                  [class.fixed]="!isEditable(r, c)"
                  [class.editable]="isEditable(r, c)"
                  [class.error]="isError(r, c)"
                  [class.border-right]="(c+1) % 3 === 0 && c < 8"
                  [class.border-bottom]="(r+1) % 3 === 0 && r < 8"
                  [class.highlight]="selectedNumber !== null && isEditable(r,c) && grid[r][c] === 0">
                <!-- Jika sel kosong, tidak tampil angka -->
                <span *ngIf="cell !== 0" class="cell-value">{{ cell }}</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Tombol aksi -->
      <div class="action-panel">
        <button class="action-btn glass-btn" (click)="newGame()">✨ Generate</button>
        <button class="action-btn glass-btn" (click)="solve()">⚡ Solve</button>
        <button class="action-btn glass-btn" (click)="reset()">🔄 Reset</button>
      </div>
    </div>
  </div>
  <app-footer></app-footer>
</div>
</body>
