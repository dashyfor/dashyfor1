<body class="hold-transition sidebar-mini layout-fixed layout-navbar-fixed layout-footer-fixed">
  <div class="wrapper">
    <app-header></app-header>

    <app-sidebar moduleName="mahasiswa"></app-sidebar>

    <!-- Content Wrapper -->
    <div class="content-wrapper">
      <!-- Content Header -->
      <div class="content-header">
        <div class="container-fluid">
          <div class="row mb-2">
            <div class="col-sm-6">
              <h1 class="m-0 text-dark">Mahasiswa</h1>
            </div>

            <div class="col-sm-6">
              <ol class="breadcrumb float-sm-right">
                <li class="breadcrumb-item">
                  <a href="/dashboard">Home</a>
                </li>
                <li class="breadcrumb-item active">Mahasiswa</li>
              </ol>
            </div>
          </div>
        </div>
      </div>

      <!-- Content -->
      <section class="content">
        <div class="container-fluid">
          <div class="row">
            <div class="col-12">
              <div class="card">
                <div class="card-header">
                  <h3 class="card-title">Data Mahasiswa</h3>

                  <div class="card-tools">
                    <button type="button" class="btn btn-tool" id="refreshTable">
                      <i class="fas fa-sync-alt"></i>
                    </button>
                  </div>
                </div>

                <div class="card-body">
                  <!-- TOMBOL -->
                  <div class="mb-3">
                    <!-- TOMBOL TAMBAH -->
                    <button
                      id="tambahButton"
                      class="btn btn-primary mr-2"
                      (click)="showTambahModal()"
                    >
                      <i class="fa fa-plus"></i>
                      Tambah
                    </button>

                  </div>

                  <!-- TABLE -->
                  <div class="table-responsive">
                    <table id="table1" class="table table-hover table-bordered table-striped">
                      <thead>
                        <tr>
                          <th>NIM</th>
                          <th>Nama</th>
                          <th>Jenis Kelamin</th>
                          <th>Tempat, Tanggal Lahir</th>
                          <th>JP</th>
                          <th>Alamat</th>
                          <th>Status</th>
                          <th>Tahun Masuk</th>
                          <th>Aksi</th>
                        </tr>
                      </thead>

                      <tbody>
                        <!-- DATATABLE -->
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <app-footer></app-footer>
  </div>

  <!-- MODAL TAMBAH -->
  <div class="modal fade" id="tambahModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-primary">
          <h5 class="modal-title">
            <i class="fa fa-plus"></i>
            Tambah Mahasiswa Baru
          </h5>

          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>

        <div class="modal-body">
          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label>NIM</label>
                <input type="text" id="nimText" class="form-control" />
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-group">
                <label>Nama</label>
                <input type="text" id="namaText" class="form-control" />
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label>Jenis Kelamin</label>

                <select id="jenisKelaminSelect" class="form-control">
                  <option value="Laki-laki">Laki-Laki</option>
                  <option value="Perempuan">Perempuan</option>
                </select>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-group">
                <label>Tempat Lahir</label>

                <input type="text" id="tempatLahirText" class="form-control" />
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label>Tanggal Lahir</label>

                <input type="date" id="tanggalLahirText" class="form-control" />
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-group">
                <label>Jurusan / Prodi</label>

                <select id="jpSelect" class="form-control">
                  <option value="SI/ST">SI/ST</option>

                  <option value="TI/TI">TI/TI</option>
                </select>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-12">
              <div class="form-group">
                <label>Alamat</label>

                <input type="text" id="alamatText" class="form-control" />
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label>Status Pernikahan</label>

                <select id="statusNikahSelect" class="form-control">
                  <option value="Belum Menikah">Belum Menikah</option>

                  <option value="Menikah">Menikah</option>

                  <option value="Duda">Duda</option>

                  <option value="Janda">Janda</option>
                </select>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-group">
                <label>Tahun Masuk</label>

                <input type="number" id="tahunMasukText" class="form-control" />
              </div>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">
            <i class="fa fa-times"></i>
            Batal
          </button>

          <button type="button" class="btn btn-primary" (click)="postRecord()">
            <i class="fa fa-save"></i>
            Simpan
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
